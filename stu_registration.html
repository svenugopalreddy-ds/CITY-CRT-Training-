<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <center>
        <h1>Student Registration</h1>
    <form>
        <fieldset>
            <legend>Basic Information</legend>
        <label for="name">Name</label>
        <input
        type="text"
        id="name"
        placeholder="Enter the name" required/><br><br>
        <label for="email">Email</label>
        <input
        type="email"
        id="email"
        placeholder="enter email" required/><br><br>

        <label for="Date">DOB</label>
        <input 
        type="date"
        id="Date" required/><br><br>
        <label for="gender">Gender:</label>
        <input 
        name="Gender" 
        type="radio" 
        id="gender"
        required/>Male
        <input 
        name="Gender" 
        type="radio" 
        id="gender"
        required/>Female
        <input 
        name="Gender" 
        type="radio" 
        id="gender"
        required/>Others
        <br><br>
        <label for="age">Age:</label>
        <input 
        type="number"
        id="age"
        min="18"
        max="60" required>
        </fieldset>
        <fieldset>
            <legend>Academic Information</legend>
        <label>Branch</label>
        <select>
            <option>CSE</option>
            <option>CAI</option>
            <option>CDS</option>
            <option>CS</option>
            <option>CAIML</option>
            <option>CIVIL</option>
            <option>ECE</option>
        </select><br><br>
        <label for="bio">Bio</label>
        <textarea id="bio"
            placeholder="Enter About you" required>
        </textarea><br><br>
        <label>Resume</label>
        <input type="file" required/><br><br>
        <label>Skills:</label>
        <input type="checkbox"/>
        <label>Python</label><br>
        <input type="checkbox"/>
        <label>AI</label><br>
        <input type="checkbox"/>
        <label>HTML</label><br>
        <input type="checkbox"/>
        <label>CSS</label><br>
        <input type="checkbox"/>
        <label>JAVA</label><br>
        </fieldset>
        <fieldset>
            <legend>Additional Information</legend>
            <label for="progress">Progress on Tech</label>
            <input
            type="range"
            min="0"
            max="10"/>
        </fieldset>
        <input type="checkbox"/>
        <label>I Accept This info is correct a per my Knowledge</label><br><br>
        <button type="submit">Submit</button>
    </form>
    </center>
</body>
</html>
